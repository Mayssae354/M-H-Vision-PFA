# Server
server.port=8082
spring.application.name=smartvision-backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smartvision
spring.datasource.username=visionMH
spring.datasource.password=Hamza2004
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# JWT
jwt.secret=SmartVision2024SecretKeyTresLongueMinimum256Bits!!
